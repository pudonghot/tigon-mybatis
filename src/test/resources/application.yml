# common config
mybatis:
  executor-type: REUSE
  lazy-initialization: false
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations:
    - classpath*:com/pudonghot/tigon/mybatis/mapper/*Mapper.xml

tigon:
  mybatis:
    quotation-mark: "`"
    insert-default-instead-null: false